<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Chatbot</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    transition: 0.3s;
}

.dark {
    background: #0f172a;
    color: white;
}

.light {
    background: #f1f5f9;
    color: black;
}

header {
    padding: 15px;
    text-align: center;
    font-size: 20px;
    background: linear-gradient(90deg, #6366f1, #22c55e);
    color: white;
}

#chat-container {
    height: 75vh;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
}

.message {
    padding: 12px;
    margin: 8px;
    border-radius: 10px;
    max-width: 60%;
    opacity: 0;
    animation: fadeIn 0.3s forwards;
}

.user {
    background: #2563eb;
    color: white;
    margin-left: auto;
}

.bot {
    background: #1e293b;
    color: white;
}

.light .bot {
    background: #e2e8f0;
    color: black;
}

#input-area {
    display: flex;
    padding: 10px;
}

input {
    flex: 1;
    padding: 10px;
    border-radius: 5px;
    border: none;
}

button {
    margin-left: 10px;
    padding: 10px;
    border: none;
    cursor: pointer;
    border-radius: 5px;
}

.send { background: #22c55e; color: white; }
.mic { background: #f59e0b; color: white; }
.toggle { background: #6366f1; color: white; }

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}

/* Neon glow */
.message {
    box-shadow: 0 0 10px rgba(34,197,94,0.3);
}
</style>
</head>

<body class="dark">

<header>
🤖 AI Chatbot 
<button class="toggle" onclick="toggleMode()">🌗</button>
</header>

<div id="chat-container"></div>

<div id="input-area">
    <input id="msg" placeholder="Type message..." onkeypress="handleKey(event)">
    <button class="send" onclick="send()">Send</button>
    <button class="mic" onclick="voice()">🎤</button>
</div>

<script>
// Load chat memory
window.onload = () => {
    let saved = localStorage.getItem("chat");
    if (saved) {
        document.getElementById("chat-container").innerHTML = saved;
    }
};

// Save chat
function saveChat() {
    localStorage.setItem("chat", document.getElementById("chat-container").innerHTML);
}

// Send message
function send() {
    let msg = document.getElementById("msg").value;
    if (!msg) return;

    let chat = document.getElementById("chat-container");

    let userDiv = document.createElement("div");
    userDiv.className = "message user";
    userDiv.innerText = msg;
    chat.appendChild(userDiv);

    // Typing indicator
    let typing = document.createElement("div");
    typing.className = "message bot";
    typing.innerText = "Typing...";
    chat.appendChild(typing);

    chat.scrollTop = chat.scrollHeight;

    fetch("/get", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: msg})
    })
    .then(res => res.json())
    .then(data => {
        typing.remove();

        let botDiv = document.createElement("div");
        botDiv.className = "message bot";
        botDiv.innerText = data.reply;
        chat.appendChild(botDiv);

        chat.scrollTop = chat.scrollHeight;
        saveChat();
    });

    document.getElementById("msg").value = "";
}

// Enter key support
function handleKey(e) {
    if (e.key === "Enter") send();
}

// Dark/Light toggle
function toggleMode() {
    document.body.classList.toggle("dark");
    document.body.classList.toggle("light");
}

// Voice input
function voice() {
    let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.start();

    recognition.onresult = function(event) {
        document.getElementById("msg").value = event.results[0][0].transcript;
    };
}
</script>

</body>
</html>
